services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - ws

  ws:
    build:
      context: .
      dockerfile: Dockerfile.ws
    restart: unless-stopped
    ports:
      - "${WS_PORT:-3001}:3001"   # host:container — container side is always 3001
    environment:
      PORT: "3001"                 # Node always listens on 3001 inside the container
